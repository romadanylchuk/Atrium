appId: io.github.romadanylchuk.atrium
productName: Atrium
copyright: Copyright © 2026 Roma Danylchuk

directories:
  buildResources: build
  output: dist-electron

files:
  - out/**/*
  - package.json
  - "!**/*.{md,map,ts,tsx}"

asar: true
asarUnpack:
  - "**/node-pty/**"
  - "**/@parcel/watcher*/**"
  - "**/*.node"

# Both node-pty and @parcel/watcher ship NAPI-stable prebuilts; no source rebuild needed.
npmRebuild: false

win:
  target: nsis
  artifactName: Atrium-${version}-win-${arch}.${ext}
  icon: build/icon.ico
  # Skip signing for local --dir smoke builds (no cert available in v1)
  signAndEditExecutable: false

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: true
  perMachine: false

mac:
  # Set CSC_IDENTITY_AUTO_DISCOVERY=false in env to skip keychain lookup for unsigned v1 builds.
  target:
    - target: dmg
      arch: universal
  artifactName: Atrium-${version}-mac-universal.${ext}
  icon: build/icon.icns
  category: public.app-category.developer-tools
  hardenedRuntime: false

linux:
  target:
    - AppImage
    - deb
  artifactName: Atrium-${version}-linux-${arch}.${ext}
  icon: build/icon.png
  category: Development
  maintainer: "Roma Danylchuk <roma@danylchuk.dev>"

publish:
  provider: github
  owner: romadanylchuk
  repo: Atrium
  releaseType: draft
  vPrefixedTagName: true
